<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logo-gradient" x1="0" y1="100" x2="100" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4F46E5" />
      <stop offset="1" stop-color="#06B6D4" />
    </linearGradient>
  </defs>
  
  <!-- Outer Circle Border -->
  <circle cx="50" cy="50" r="46" stroke="url(#logo-gradient)" stroke-width="2.5" />
  
  <!-- Network Graph -->
  <g>
    <!-- Hub Node (Center-Right) -->
    <circle cx="56" cy="51" r="7.5" fill="url(#logo-gradient)" />
    
    <!-- Outer Nodes -->
    <circle cx="68" cy="22" r="5" fill="url(#logo-gradient)" /> <!-- Top-Right -->
    <circle cx="28" cy="40" r="6.5" fill="url(#logo-gradient)" /> <!-- Top-Left -->
    <circle cx="38" cy="74" r="5.5" fill="url(#logo-gradient)" /> <!-- Bottom-Left -->
    <circle cx="75" cy="76" r="4.5" fill="url(#logo-gradient)" /> <!-- Bottom-Right -->

    <!-- Connections (Hub to Outer) -->
    <line x1="56" y1="51" x2="68" y2="22" stroke="url(#logo-gradient)" stroke-width="2.2" />
    <line x1="56" y1="51" x2="28" y2="40" stroke="url(#logo-gradient)" stroke-width="2.2" />
    <line x1="56" y1="51" x2="38" y2="74" stroke="url(#logo-gradient)" stroke-width="2.2" />
    <line x1="56" y1="51" x2="75" y2="76" stroke="url(#logo-gradient)" stroke-width="2.2" />
    
    <!-- Outer Connections (Perimeter) -->
    <line x1="68" y1="22" x2="28" y2="40" stroke="url(#logo-gradient)" stroke-width="2.2" stroke-linecap="round" />
    <line x1="28" y1="40" x2="38" y2="74" stroke="url(#logo-gradient)" stroke-width="2.2" stroke-linecap="round" />
    <line x1="38" y1="74" x2="75" y2="76" stroke="url(#logo-gradient)" stroke-width="2.2" stroke-linecap="round" />
  </g>
</svg>
